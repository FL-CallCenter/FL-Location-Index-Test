name: Sync Hubs from OneDrive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# This forces GitHub to unlock the door for the robot
permissions:
  contents: write 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download CSV from OneDrive
        run: |
          mkdir -p data
          curl -L "https://phoenixfranchisebrands-my.sharepoint.com/:x:/g/personal/austin_fioritti_furryland_us/IQAPmSdcYSINRLrQTWub2E-AAWlzlKJq9yWo3XPukt4ie-4?download=1" -o data/locations.csv

      - name: Commit and Push to Website
        run: |
          git config --global user.name "Microsoft Sync Bot"
          git config --global user.email "actions@github.com"
          git add data/locations.csv
          # This safely checks if the file actually changed before trying to push
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-synced latest locations" && git push)
