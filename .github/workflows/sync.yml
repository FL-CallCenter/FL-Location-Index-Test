name: Sync Hubs from OneDrive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # FIX: Forces the robot to read your site's full history so it doesn't get confused

      - name: Download CSV from OneDrive
        run: |
          mkdir -p data
          curl -L "https://phoenixfranchisebrands-my.sharepoint.com/:x:/g/personal/austin_fioritti_furryland_us/IQAPmSdcYSINRLrQTWub2E-AAWlzlKJq9yWo3XPukt4ie-4?download=1" -o data/locations.csv

      - name: Commit and Push to Website
        run: |
          git config --global user.name "Microsoft Sync Bot"
          git config --global user.email "actions@github.com"
          
          # FIX: Download any recent code changes YOU made first
          git pull origin main
          
          # Save the new CSV and push to the live website
          git add data/locations.csv
          git commit -m "Auto-synced latest locations" || echo "No changes to commit"
          git push
