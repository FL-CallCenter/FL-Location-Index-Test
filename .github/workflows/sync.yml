name: Sync Hubs from OneDrive

# This tells the robot when to run
on:
  schedule:
    - cron: '*/30 * * * *' # Runs automatically every 30 minutes
  workflow_dispatch: # Adds a button so you can trigger it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download CSV from OneDrive
        # Uses your exact public download link to grab the file
        run: |
          curl -L "https://phoenixfranchisebrands-my.sharepoint.com/:x:/g/personal/austin_fioritti_furryland_us/IQAPmSdcYSINRLrQTWub2E-AAWlzlKJq9yWo3XPukt4ie-4?download=1" -o data/locations.csv

      - name: Commit and Push to Website
        # Saves the new file to your GitHub so the website updates
        run: |
          git config --global user.name "Microsoft Sync Bot"
          git config --global user.email "actions@github.com"
          git add data/locations.csv
          git commit -m "Auto-synced latest locations from OneDrive" || echo "No changes found"
          git push
