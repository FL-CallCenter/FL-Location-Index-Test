name: Sync Hubs from OneDrive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download CSV from OneDrive
        run: |
          mkdir -p data
          curl -L "https://phoenixfranchisebrands-my.sharepoint.com/:x:/g/personal/austin_fioritti_furryland_us/IQAPmSdcYSINRLrQTWub2E-AAWlzlKJq9yWo3XPukt4ie-4?download=1" -o data/locations.csv

      - name: Commit and Push to Website
        run: |
          git config --global user.name "Microsoft Sync Bot"
          git config --global user.email "actions@github.com"
          
          # Step 1: Tell the robot to prep the new CSV
          git add data/locations.csv
          git diff --staged --quiet || git commit -m "Auto-synced latest locations"
          
          # Step 2: Look both ways and safely merge any code edits YOU just made
          git pull --rebase origin main
          
          # Step 3: Push it all to the live site
          git push
