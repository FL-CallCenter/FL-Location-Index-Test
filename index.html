  async function loadData() {
    try {
      const responses = await Promise.all(csvUrls.map(url => fetch(url).then(r => r.text())));
      responses.forEach(csv => {
        csv.split('\n').slice(1).forEach(row => {
          const m = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          if (m) data.push({ name: m[0].replace(/"/g,'').trim(), zip: m[1].trim(), phone: m[2]?.trim() || "No phone", link: m[3]?.replace(/"/g,'').trim() || "#", city: m[4]?.trim() || "", state: m[5]?.trim() || "" });
        });
      });
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('searchBtn').textContent = "Search ZIP";
      plotHubs(); buildCustomDropdown();
    } catch (err) { console.error(err); }
  }

  function plotHubs() {
    const plotted = new Set();
    data.forEach(d => {
      if (d.city && cityCoords[d.city] && !plotted.has(d.city)) {
        plotted.add(d.city);
        const icon = L.divIcon({ className: '', html: '<div class="pulsing-marker"></div>', iconSize: [8, 8], iconAnchor: [4, 4] });
        const marker = L.marker(cityCoords[d.city], { icon: icon }).addTo(map).bindPopup(`<div style="text-align: center;"><strong>FurryLand ${d.city}</strong><br><div style="margin: 5px 0; font-size:13px;">📞 ${d.phone}</div><a href="${d.link}" target="_blank" class="book-btn">Book Now</a></div>`);
        markers[d.city] = marker;
      }
    });
  }

  function buildCustomDropdown() {
    const dropdown = document.getElementById('customDropdown');
    const cities = [...new Set(data.map(d => d.city))].filter(c => cityCoords[c]).sort();
    dropdown.innerHTML = cities.map(city => `<div class="dropdown-item" onclick="selectCity('${city}')">${city}</div>`).join('');
  }

  function showDropdown() { document.getElementById('customDropdown').style.display = 'block'; }
  function filterDropdown() {
    const input = document.getElementById('hubSearchInput').value.toLowerCase();
    const items = document.querySelectorAll('.dropdown-item');
    items.forEach(item => item.style.display = item.innerText.toLowerCase().includes(input) ? 'block' : 'none');
  }

  function selectCity(city) {
    document.getElementById('hubSearchInput').value = city;
    document.getElementById('customDropdown').style.display = 'none';
    const match = data.find(d => d.city === city);
    if (match && cityCoords[city]) {
      map.flyTo(cityCoords[city], 8);
      if (markers[city]) markers[city].openPopup();
      displayStateLocations(match.state);
      document.getElementById('result').innerText = "📍 Found: " + city + ", " + match.state;
    }
  }

  function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const match = data.find(d => d.zip === zip);
    if (match) {
      document.getElementById('result').innerText = "📍 Found: " + match.city + ", " + match.state;
      if (match.city && cityCoords[match.city]) {
          map.flyTo(cityCoords[match.city], 8);
          if (markers[match.city]) markers[match.city].openPopup();
          displayStateLocations(match.state);
      }
    } else { document.getElementById('result').innerText = "No service here yet!"; }
  }

  function displayStateLocations(code) {
    const list = document.getElementById('location-list');
    const head = document.getElementById('list-header');
    const matches = data.filter(d => d.state === code);
    const unique = Array.from(new Set(matches.map(m => m.city))).map(c => matches.find(m => m.city === c));
    if(unique.length > 0) { head.classList.remove('hidden'); list.innerHTML = unique.map(m => `<div class="state-card"><strong>${m.city}, ${m.state}</strong><span class="phone-line">📞 ${m.phone}</span><a href="${m.link}" target="_blank" class="book-btn">Book Now</a></div>`).join(''); }
  }

  function resetMap() { map.setView([39.82, -98.57], 4); }
  function switchTab(t) { document.getElementById('locator-section').classList.toggle('hidden', t !== 'locator'); document.getElementById('breed-section').classList.toggle('hidden', t === 'locator'); document.getElementById('tab-loc').classList.toggle('active', t === 'locator'); document.getElementById('tab-breed').classList.toggle('active', t !== 'locator'); if(t === 'locator') setTimeout(() => map.invalidateSize(), 200); }
  window.onclick = (e) => { if (!e.target.matches('#hubSearchInput')) document.getElementById('customDropdown').style.display = 'none'; }
  document.getElementById('zipInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') lookup(); });
  loadData();
</script>
