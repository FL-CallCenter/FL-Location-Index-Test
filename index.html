<!DOCTYPE html>
<html lang="en">
<head>

  <title>FURRYLAND Hub</title>

  <style>
    :root {
      --fl-orange: #f07b23;
      --fl-blue: #2576d0;
      --fl-bg: #efeee9;
      --fl-accent: #f2ffff;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
      background-color: var(--fl-bg); 
      display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
    }

    /* Tabs */
    .tabs { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; max-width: 380px; }
    .tab-btn {
      flex: 1; padding: 12px; border: none; border-radius: 12px; background: #d1d1d1;
      cursor: pointer; font-weight: bold; color: #555; transition: 0.3s;
    }
    .tab-btn.active { background: var(--fl-blue); color: white; }

    /* UI Cards */
    .card {
      background: white; padding: 30px; border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
      text-align: center; border-top: 6px solid var(--fl-orange); margin-bottom: 20px;
      box-sizing: border-box;
    }

    h2 { color: var(--fl-orange); margin: 0; font-weight: 800; text-transform: uppercase; font-size: 28px; }
    .subtitle { color: #444; font-size: 16px; margin: 2px 0; font-weight: 600; text-transform: uppercase; }
    
    input, select { 
      padding: 15px; font-size: 16px; width: 100%; border: 2px solid #ddd; 
      border-radius: 10px; box-sizing: border-box; background-color: var(--fl-accent); outline: none;
      margin-top: 10px;
    }

    #searchBtn { 
      padding: 15px; width: 100%; margin-top: 15px; background-color: var(--fl-orange); 
      color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
    }

    /* Map & Popup Styles */
    #map {
      height: 550px; width: 100%; max-width: 1000px; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 5px solid white;
    }
    .leaflet-popup-content-wrapper { text-align: center !important; border-radius: 12px; }
    .leaflet-popup-content { display: flex !important; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }

    /* Subtle Pulsing Pin */
    .pulsing-marker { width: 8px; height: 8px; background-color: var(--fl-blue); border-radius: 50%; position: relative; }
    .pulsing-marker::after {
      content: ""; width: 100%; height: 100%; border: 2px solid var(--fl-blue);
      border-radius: 50%; position: absolute; top: -2px; left: -2px;
      animation: pulse 2.5s infinite ease-out;
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

    /* Directory List Styles */
    #location-list {
      width: 100%; max-width: 1000px; margin-top: 20px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px;
    }
    .state-card {
      background: white; padding: 15px; border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid var(--fl-blue); text-align: left;
    }
    .state-card strong { display: block; color: var(--fl-orange); margin-bottom: 5px; }

    .book-btn { background-color: #28a745; color: white !important; text-decoration: none; padding: 8px 15px; border-radius: 50px; display: inline-block; margin-top: 8px; font-weight: bold; font-size: 13px; }
    .hidden { display: none !important; }
  </style>
</head>

    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=716701373&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=977992752&single=true&output=csv',

    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1348062773&single=true&output=csv'
  ];
  
  Promise.all(csvUrls.map(url => fetch(url).then(r => r.text()))).then(csvs => {
    csvs.forEach(csv => {
      csv.split('\n').slice(1).forEach(row => {
        const m = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
        if (m) data.push({
          name: m[0].replace(/"/g,'').trim(),
          zip: m[1].trim(),
          phone: m[2]?.trim() || "No phone",
          link: m[3]?.replace(/"/g,'').trim() || "#",
          city: m[4]?.trim() || "",
          state: m[5]?.trim() || "" // Column F
        });
      });
    });
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('searchBtn').textContent = "Search ZIP";
    plotHubs();
    populateDropdown();
  });

  function plotHubs() {
    const plotted = new Set();
    data.forEach(d => {
      if (d.city && cityCoords[d.city] && !plotted.has(d.city)) {
        plotted.add(d.city);
        const icon = L.divIcon({ className: '', html: '<div class="pulsing-marker"></div>', iconSize: [8, 8] });
        L.marker(cityCoords[d.city], { icon: icon }).addTo(map).bindPopup(`
            <div style="text-align: center;">
              <strong>FurryLand ${d.city}</strong><br>
              📞 ${d.phone}<br>
              <a href="${d.link}" target="_blank" class="book-btn">Book Now</a>
            </div>
        `);
      }
    });
  }

  function populateDropdown() {
    const drop = document.getElementById('hubDropdown');
    const cities = [...new Set(data.map(d => d.city))].sort();
    cities.forEach(c => { if(c && cityCoords[c]) drop.add(new Option(c, c)); });
  }

  function jumpToHub(city) {
    if(!city) return;
    const match = data.find(d => d.city === city);
    map.flyTo(cityCoords[city], 8);
    displayStateLocations(match.state);
  }

  function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const match = data.find(d => d.zip === zip);
    const res = document.getElementById('result');
    if (match) {
      res.innerHTML = `<strong>📍 ${match.name}</strong><br>📞 ${match.phone}<br><a href="${match.link}" target="_blank" class="book-btn">Book Now</a>`;
      if (match.city && cityCoords[match.city]) {
          map.flyTo(cityCoords[match.city], 8);
          displayStateLocations(match.state);
      }
    } else { res.innerHTML = "No service here yet!"; }
  }

  function filterByStateName(name) {
    const stateCodes = { 'Michigan': 'MI', 'Texas': 'TX', 'Florida': 'FL', 'Nevada': 'NV', 'Georgia': 'GA', 'Arizona': 'AZ', 'North Carolina': 'NC', 'Georgia': 'GA' }; // Add more as needed
    displayStateLocations(stateCodes[name] || name);
  }

  function displayStateLocations(code) {
    const list = document.getElementById('location-list');
    const head = document.getElementById('list-header');
    const matches = data.filter(d => d.state === code);
    const unique = Array.from(new Set(matches.map(m => m.city))).map(c => matches.find(m => m.city === c));
    
    if(unique.length > 0) {
      head.classList.remove('hidden');
      list.innerHTML = unique.map(m => `<div class="state-card"><strong>${m.name}</strong>📞 ${m.phone}<br><a href="${m.link}" target="_blank" class="book-btn">Book Now</a></div>`).join('');
    }
  }

  function switchTab(t) {
    document.getElementById('locator-section').classList.toggle('hidden', t !== 'locator');
    document.getElementById('breed-section').classList.toggle('hidden', t === 'locator');
    document.getElementById('tab-loc').classList.toggle('active', t === 'locator');
    document.getElementById('tab-breed').classList.toggle('active', t !== 'locator');
    if(t === 'locator') setTimeout(() => map.invalidateSize(), 200);
  }
</script>
