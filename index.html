<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furry Land ZIP Lookup</title>
  <style>
    /* FURRY LAND BRANDED COLOR PALETTE */
    :root {
      --fl-orange: #f07b23;
      --fl-blue: #2576d0;
      --fl-bg: #efeee9;
      --fl-accent: #f2ffff;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
      background-color: var(--fl-bg); 
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 380px;
      text-align: center;
      border-top: 5px solid var(--fl-orange); /* Branded top border */
    }

    h2 { 
      color: var(--fl-orange); 
      margin-bottom: 5px; 
      font-weight: 800;
      text-transform: uppercase;
    }

    p.subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 25px;
      font-weight: 500;
    }

    input { 
      padding: 15px; 
      font-size: 16px; 
      width: 100%; 
      border: 2px solid #ddd; 
      border-radius: 10px; 
      box-sizing: border-box;
      background-color: var(--fl-accent);
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: var(--fl-blue);
    }

    button { 
      padding: 15px; 
      font-size: 16px; 
      width: 100%; 
      margin-top: 15px; 
      background-color: var(--fl-orange); 
      color: white; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: bold;
      text-transform: uppercase;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover { background-color: #d66a1a; }
    button:active { transform: scale(0.98); }
    button:disabled { background-color: #ccc; cursor: not-allowed; }

    .loading-text {
      margin-top: 20px;
      font-size: 14px;
      color: var(--fl-blue);
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }

    #result { 
      margin-top: 30px; 
      min-height: 80px;
    }

    .location-label { 
      color: #333; 
      font-weight: 700; 
      display: block; 
      font-size: 18px;
      margin-bottom: 10px;
    }
    
    .phone-link { 
      display: inline-block;
      color: white; 
      background-color: var(--fl-blue);
      text-decoration: none; 
      font-size: 18px; 
      font-weight: bold;
      padding: 10px 25px;
      border-radius: 50px;
      box-shadow: 0 4px 10px rgba(37, 118, 208, 0.3);
      transition: background 0.2s;
    }

    .phone-link:hover {
      background-color: #1a5cad;
    }
  </style>
</head>

    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1216528010&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1348062773&single=true&output=csv'
  ];

  Promise.all(csvUrls.map(url => fetch(url).then(res => res.text())))
    .then(csvs => {
      csvs.forEach(csvText => {
        const rows = csvText.trim().split('\n');
        rows.slice(1).forEach(row => { 
          const match = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          if (!match) return;

          const location = match[0].replace(/"/g,'').trim();
          const zip = match[1].replace(/"/g,'').trim();
          const phone = match[2] ? match[2].replace(/"/g,'').trim() : "No phone listed";

          data.push({ zip, location, phone });
        });
      });
      
      statusMsg.textContent = ""; 
      searchBtn.disabled = false;
      searchBtn.textContent = "Search ZIP";
    })
    .catch(err => {
      statusMsg.textContent = "Error loading data.";
      console.error(err);
    });

  function lookup() {
    const zipInput = document.getElementById('zipInput').value.trim();
    if (!zipInput) {
      resultDiv.innerHTML = "<span style='color:var(--fl-orange);'>Enter a ZIP code</span>";
      return;
    }

    const match = data.find(entry => entry.zip.replace(/\s+/g,'') === zipInput.replace(/\s+/g,''));

    if (match) {
      resultDiv.innerHTML = `
        <span class="location-label">📍 ${match.location}</span>
        <a href="tel:${match.phone}" class="phone-link">📞 ${match.phone}</a>
      `;
    } else {
      resultDiv.innerHTML = "<span style='color:#666;'>No service in this ZIP yet!</span>";
    }
  }

  document.getElementById('zipInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') lookup();
  });
</script>

</body>
</html>
