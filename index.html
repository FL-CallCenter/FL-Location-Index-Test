    <title>FURRYLAND Internal Hub</title>
    <style>
        :root { --fl-orange: #f07b23; --fl-blue: #2576d0; --fl-bg: #efeee9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fl-bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }

        /* Search Card */
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--fl-orange); margin-bottom: 20px; z-index: 100; }
        input { padding: 15px; width: 80%; border: 2px solid #ddd; border-radius: 10px; outline: none; font-size: 16px; }
        #searchBtn { padding: 15px; width: 85%; margin-top: 15px; background: var(--fl-orange); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Map Container (Non-Moveable) */
        #map-container { 
            position: relative; 
            width: 100%; 
            max-width: 950px; 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* The SVG Map */
        #us-map { width: 100%; height: auto; display: block; }
        path { fill: #e0e0e0; stroke: #ffffff; stroke-width: 1; transition: fill 0.3s; cursor: pointer; }
        path:hover { fill: #d1d1d1; }
        path.active-state { fill: #cbdcf0; stroke: var(--fl-blue); stroke-width: 2; }

        /* Pulsing Pin Styling */
        .pin {
            position: absolute;
            width: 12px; height: 12px;
            background-color: var(--fl-blue);
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 50;
        }
        .pin::after {
            content: ""; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            border: 3px solid var(--fl-blue); border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring { 
            0% { transform: scale(1); opacity: 1; } 
            100% { transform: scale(4); opacity: 0; } 
        }

        /* Tooltip/Popup */
        .info-box { position: absolute; background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; z-index: 200; pointer-events: none; }
        
        .hidden { display: none; }
    </style>

    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1216528010&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1348062773&single=true&output=csv'
  ];
    // Load Data and Draw Pins
    async function init() {
        const responses = await Promise.all(csvUrls.map(url => fetch(url).then(res => res.text())));
        responses.forEach(csv => {
            const rows = csv.trim().split('\n').slice(1);
            rows.forEach(row => {
                const cols = row.split(',');
                data.push({
                    name: cols[0]?.trim(),
                    zip: cols[1]?.trim(),
                    phone: cols[2]?.trim(),
                    link: cols[3]?.trim(),
                    city: cols[4]?.trim() // THIS IS COLUMN E
                });
            });
        });
        drawPins();
    }

    function drawPins() {
        const layer = document.getElementById('pins-layer');
        const uniqueCities = [...new Set(data.map(d => d.city))];

        uniqueCities.forEach(cityName => {
            const config = cityMap[cityName];
            if (config) {
                const pin = document.createElement('div');
                pin.className = 'pin';
                pin.style.top = config.top;
                pin.style.left = config.left;
                
                pin.onclick = () => {
                    const match = data.find(d => d.city === cityName);
                    showResult(match);
                };

                pin.onmouseover = (e) => showTooltip(cityName, e);
                pin.onmouseout = hideTooltip;

                layer.appendChild(pin);
            }
        });
    }

    function lookup() {
        const zip = document.getElementById('zipInput').value.trim();
        const match = data.find(d => d.zip === zip);
        if (match) {
            showResult(match);
        } else {
            document.getElementById('result').innerHTML = "<p style='color:red;'>ZIP Not Found</p>";
        }
    }

    function showResult(match) {
        document.getElementById('result').innerHTML = `
            <div style="font-weight:bold; font-size:18px; color:var(--fl-blue);">📍 ${match.name}</div>
            <div style="margin: 10px 0;">📞 ${match.phone}</div>
            <a href="${match.link}" target="_blank" style="background:#28a745; color:white; padding:10px 20px; border-radius:50px; text-decoration:none; display:inline-block; font-weight:bold;">BOOK NOW</a>
        `;
    }

    function showTooltip(name, e) {
        const box = document.getElementById('infoBox');
        box.style.display = 'block';
        box.style.top = (e.pageY - 40) + "px";
        box.style.left = (e.pageX + 10) + "px";
        box.innerText = name;
    }

    function hideTooltip() { document.getElementById('infoBox').style.display = 'none'; }

    init();
</script>
