  <style>
    :root {
      --fl-orange: #f07b23;
      --fl-blue: #2576d0;
      --fl-bg: #efeee9;
      --fl-accent: #f2ffff;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
      background-color: var(--fl-bg); 
      display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
    }

    .card {
      background: white; padding: 35px; border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px;
      text-align: center; border-top: 6px solid var(--fl-orange); margin-bottom: 20px;
    }

    h2 { color: var(--fl-orange); margin: 0; font-weight: 800; text-transform: uppercase; font-size: 28px; }
    p.subtitle { color: #444; font-size: 16px; margin: 2px 0; font-weight: 600; text-transform: uppercase; }
    
    input { 
      padding: 15px; font-size: 16px; width: 100%; border: 2px solid #ddd; 
      border-radius: 10px; box-sizing: border-box; background-color: var(--fl-accent); outline: none;
    }

    #searchBtn { 
      padding: 15px; width: 100%; margin-top: 15px; background-color: var(--fl-orange); 
      color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
    }

    #map {
      height: 550px; width: 100%; max-width: 1000px; border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 5px solid white;
    }

    /* CENTER POPUP CONTENT */
    .leaflet-popup-content-wrapper { text-align: center !important; border-radius: 12px; }
    .leaflet-popup-content { display: flex !important; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }

    /* SMALL SUBTLE PULSING PIN */
    .pulsing-marker { width: 8px; height: 8px; background-color: var(--fl-blue); border-radius: 50%; position: relative; }
    .pulsing-marker::after {
      content: ""; width: 100%; height: 100%; border: 2px solid var(--fl-blue);
      border-radius: 50%; position: absolute; top: -2px; left: -2px;
      animation: pulse 2.5s infinite ease-out;
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }

    .book-btn { background-color: #28a745; color: white !important; text-decoration: none; padding: 8px 15px; border-radius: 50px; display: inline-block; margin-top: 8px; font-weight: bold; }
    #result { margin-top: 15px; min-height: 50px; }
  </style>

    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1616350219&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=544183757&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=2052241812&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1216528010&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1348062773&single=true&output=csv'
  ];
  async function loadAllData() {
    try {
      const responses = await Promise.all(csvUrls.map(url => fetch(url).then(r => r.text())));
      responses.forEach(csv => {
        const rows = csv.trim().split('\n').slice(1);
        rows.forEach(row => {
          const m = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          if (m) {
            data.push({
              name: m[0].replace(/"/g,'').trim(),
              zip: m[1].trim(),
              phone: m[2]?.trim() || "No phone",
              link: m[3]?.replace(/"/g,'').trim() || "#",
              city: m[4]?.trim() || "" // Column E
            });
          }
        });
      });
      document.getElementById('statusMessage').textContent = "";
      document.getElementById('searchBtn').disabled = false;
      plotHubs();
    } catch (err) {
      document.getElementById('statusMessage').textContent = "Error loading data.";
      console.error(err);
    }
  }

  function plotHubs() {
    const plotted = new Set();
    data.forEach(d => {
      if (d.city && cityCoords[d.city] && !plotted.has(d.city)) {
        plotted.add(d.city);
        const icon = L.divIcon({
          className: '',
          html: '<div class="pulsing-marker"></div>',
          iconSize: [8, 8],
          iconAnchor: [4, 4]
        });
        
        L.marker(cityCoords[d.city], { icon: icon })
          .addTo(map)
          .bindPopup(`
            <div style="text-align: center;">
              <strong style="font-size: 16px; display: block; margin-bottom: 5px;">FurryLand ${d.city}</strong>
              <div style="margin-bottom: 8px;">📞 ${d.phone}</div>
              <a href="${d.link}" target="_blank" class="book-btn">Book Now</a>
            </div>
          `);
      }
    });
  }

  function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const match = data.find(d => d.zip === zip);
    const res = document.getElementById('result');
    if (match) {
      res.innerHTML = `
        <div style="margin-top:10px;">
          <strong>📍 ${match.name}</strong><br>
          📞 ${match.phone}<br>
          <a href="${match.link}" target="_blank" class="book-btn">Book Now</a>
        </div>`;
      if (match.city && cityCoords[match.city]) {
        map.flyTo(cityCoords[match.city], 7, { animate: true, duration: 1.5 });
      }
    } else {
      res.innerHTML = "<p style='color:#666;'>No service in this ZIP yet!</p>";
    }
  }

  document.getElementById('zipInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') lookup();
  });

  loadAllData();
</script>
</body>
</html>
