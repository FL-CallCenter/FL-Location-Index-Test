<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FURRYLAND Internal Hub</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --fl-orange: #f07b23;
      --fl-blue: #2576d0;
      --fl-bg: #efeee9;
      --fl-accent: #f2ffff;
    }

    body { 
      font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
      background-color: var(--fl-bg); 
      display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0;
    }

    .tabs { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 380px; }
    .tab-btn {
      flex: 1; padding: 10px; border: none; border-radius: 10px; background: #d1d1d1;
      cursor: pointer; font-weight: bold; color: #555; transition: 0.3s; font-size: 14px;
    }
    .tab-btn.active { background: var(--fl-blue); color: white; }

    .card {
      background: white; padding: 25px; border-radius: 15px; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.08); width: 100%; max-width: 380px;
      text-align: center; border-top: 5px solid var(--fl-orange); margin-bottom: 10px;
      box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
    }

    h2 { color: var(--fl-orange); margin: 0; font-weight: 800; text-transform: uppercase; font-size: 24px; }
    .subtitle { color: #444; font-size: 14px; margin: 2px 0 15px 0; font-weight: 600; text-transform: uppercase; }
    
    input { 
      padding: 12px; font-size: 15px; width: 100%; border: 2px solid #ddd; 
      border-radius: 8px; box-sizing: border-box; background-color: var(--fl-accent); outline: none;
      margin-bottom: 8px; text-align: center;
    }

    #searchBtn { 
      padding: 12px; width: 100%; background-color: var(--fl-orange); 
      color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
      text-transform: uppercase; font-size: 14px; margin-bottom: 10px;
    }

    /* SPACED RESULTS IN MAIN CARD */
    #result strong { display: block; margin-bottom: 8px; font-size: 16px; }
    #result .phone-line { margin-bottom: 12px; display: block; }

    /* SPACED DIRECTORY CARDS */
    #location-list {
      width: 100%; max-width: 900px; 
      display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 5px;
    }
    .state-card {
      background: white; padding: 20px; border-radius: 10px; width: 260px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.04); border-left: 4px solid var(--fl-blue); 
      text-align: center; display: flex; flex-direction: column; align-items: center;
    }
    .state-card strong { font-size: 16px; color: var(--fl-orange); margin-bottom: 8px; display: block; }
    .state-card .phone-line { font-size: 14px; color: #444; margin-bottom: 12px; display: block; }

    #list-header { color: var(--fl-blue); margin: 25px 0 10px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }

    /* LOWERED MAP */
    #map {
      height: 480px; width: 100%; max-width: 1000px; border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid white;
      margin-top: 40px; /* Increased spacing above map */
    }

    .book-btn { 
      background-color: #28a745; color: white !important; text-decoration: none; 
      padding: 8px 22px; border-radius: 50px; display: inline-block; 
      font-weight: bold; font-size: 12px; transition: 0.2s;
    }
    .book-btn:active { transform: scale(0.95); }

    /* Map Popup Spacing */
    .leaflet-popup-content strong { display: block; margin-bottom: 6px; }
    .leaflet-popup-content div { margin-bottom: 10px; }

    .pulsing-marker { width: 8px; height: 8px; background-color: var(--fl-blue); border-radius: 50%; position: relative; }
    .pulsing-marker::after {
      content: ""; width: 100%; height: 100%; border: 2px solid var(--fl-blue);
      border-radius: 50%; position: absolute; top: -2px; left: -2px;
      animation: pulse 2.5s infinite ease-out;
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }
    .hidden { display: none !important; }
  </style>
</head>

  async function loadData() {
    try {
      const responses = await Promise.all(csvUrls.map(url => fetch(url).then(r => r.text())));
      responses.forEach(csv => {
        csv.split('\n').slice(1).forEach(row => {
          const m = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
          if (m) data.push({
            name: m[0].replace(/"/g,'').trim(), zip: m[1].trim(), phone: m[2]?.trim() || "No phone",
            link: m[3]?.replace(/"/g,'').trim() || "#", city: m[4]?.trim() || "", state: m[5]?.trim() || ""
          });
        });
      });
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('searchBtn').textContent = "Search ZIP";
      plotHubs();
      populateAutocomplete();
    } catch (err) { console.error(err); }
  }

  function plotHubs() {
    const plotted = new Set();
    data.forEach(d => {
      if (d.city && cityCoords[d.city] && !plotted.has(d.city)) {
        plotted.add(d.city);
        const icon = L.divIcon({ className: '', html: '<div class="pulsing-marker"></div>', iconSize: [8, 8], iconAnchor: [4, 4] });
        L.marker(cityCoords[d.city], { icon: icon }).addTo(map).bindPopup(`
            <div style="text-align: center;">
              <strong>FurryLand ${d.city}</strong><br>
              <div style="margin: 5px 0; font-size:13px;">📞 ${d.phone}</div>
              <a href="${d.link}" target="_blank" class="book-btn">Book Now</a>
            </div>
        `);
      }
    });
  }

  function populateAutocomplete() {
    const list = document.getElementById('hubList');
    const cities = [...new Set(data.map(d => d.city))].sort();
    cities.forEach(c => { if(c && cityCoords[c]) list.appendChild(new Option(c, c)); });
  }

  function checkJump(val) {
    if (cityCoords[val]) {
      const match = data.find(d => d.city === val);
      map.flyTo(cityCoords[val], 8);
      displayStateLocations(match.state);
    }
  }

  function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const match = data.find(d => d.zip === zip);
    const res = document.getElementById('result');
    if (match) {
      res.innerHTML = `
        <div style="text-align:center; margin-top:10px;">
          <strong>📍 ${match.name}</strong>
          <span class="phone-line">📞 ${match.phone}</span>
          <a href="${match.link}" target="_blank" class="book-btn">Book Now</a>
        </div>`;
      if (match.city && cityCoords[match.city]) {
          map.flyTo(cityCoords[match.city], 8);
          displayStateLocations(match.state);
      }
    } else { res.innerHTML = "<p style='font-size:12px; color:#999;'>No service yet!</p>"; }
  }

  function displayStateLocations(code) {
    const list = document.getElementById('location-list');
    const head = document.getElementById('list-header');
    const matches = data.filter(d => d.state === code);
    const unique = Array.from(new Set(matches.map(m => m.city))).map(c => matches.find(m => m.city === c));
    if(unique.length > 0) {
      head.classList.remove('hidden');
      list.innerHTML = unique.map(m => `
        <div class="state-card">
          <strong>${m.city}, ${m.state}</strong>
          <span class="phone-line">📞 ${m.phone}</span>
          <a href="${m.link}" target="_blank" class="book-btn">Book Now</a>
        </div>`).join('');
    }
  }

  function switchTab(t) {
    document.getElementById('locator-section').classList.toggle('hidden', t !== 'locator');
    document.getElementById('breed-section').classList.toggle('hidden', t === 'locator');
    document.getElementById('tab-loc').classList.toggle('active', t === 'locator');
    document.getElementById('tab-breed').classList.toggle('active', t !== 'locator');
    if(t === 'locator') setTimeout(() => map.invalidateSize(), 200);
  }

  document.getElementById('zipInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') lookup(); });
  loadData();
</script>
