<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FURRYLAND Command Center</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root { 
        --fl-orange: #f07b23; 
        --fl-blue: #2576d0; 
        --fl-bg: #0f172a; 
    }
    
    html { scroll-behavior: smooth; }

    @keyframes drift {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        background: linear-gradient(-45deg, #020406, #0d1b2a, #16213e, #000000) !important;
        background-size: 200% 200% !important;
        animation: drift 10s ease infinite !important; 
        overflow-x: hidden; position: relative;
    }

    .tabs { display: flex; gap: 8px; margin-bottom: 15px; width: 100%; max-width: 550px; z-index: 2000; }
    .tab-btn { 
        flex: 1; padding: 12px; border: none; border-radius: 12px; 
        background: rgba(255,255,255,0.15); cursor: pointer; font-weight: bold; color: #fff; transition: 0.2s; 
    }
    .tab-btn.active { background: var(--fl-blue); box-shadow: 0 4px 15px rgba(37, 118, 208, 0.4); }

    .card {
        background: rgba(255, 255, 255, 0.90) !important; backdrop-filter: blur(20px);
        border-radius: 24px; padding: 25px; width: 95%; max-width: 550px;
        text-align: center; border-top: 6px solid var(--fl-orange);
        box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin-bottom: 12px;
        box-sizing: border-box; display: flex; flex-direction: column; align-items: center;
    }

    h2 { color: var(--fl-orange); margin: 0; font-weight: 800; text-transform: uppercase; }
    .subtitle { color: #222; font-size: 14px; margin-bottom: 18px; font-weight: 600; text-transform: uppercase; }

    .search-module { width: 100%; padding: 5px 0; text-align: left; }
    .module-label { font-size: 13px; font-weight: 900; display: block; margin-bottom: 8px; color: #333 !important; }

    input { padding: 14px; font-size: 16px; width: 100%; border: 1px solid #ccc; border-radius: 12px; box-sizing: border-box; margin-bottom: 5px; text-align: center; outline: none; }

    .ui-divider { width: 100%; height: 1px; background: rgba(0,0,0,0.1); margin: 25px 0; position: relative; }
    .ui-divider span { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #e2e8f0; padding: 2px 12px; border-radius: 4px; font-size: 11px; color: #475569; font-weight: 900; }

    #searchBtn { padding: 16px; width: 100%; background-color: var(--fl-orange); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    
    /* RESULT TEXT POSITIONED LOWER (Between Card and Table) */
    #result { 
        margin-top: 30px; 
        font-size: 18px; 
        font-weight: 800; 
        color: #ffffff; 
        text-transform: uppercase; 
        text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        z-index: 10;
    }

    /* RESTORED NICE DROPDOWN UI */
    .search-container { position: relative; width: 100%; }
    #customDropdown, #customBreedDropdown { 
        position: absolute; top: 100%; left: 0; right: 0; 
        background: white; border-radius: 12px; max-height: 250px; 
        overflow-y: auto; z-index: 9999; display: none; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 1px solid #eee; margin-top: 5px;
    }
    .dropdown-item, .breed-item { 
        padding: 14px; cursor: pointer; text-align: left; 
        border-bottom: 1px solid #f8f8f8; color: #333; font-size: 14px; font-weight: 500;
    }
    .dropdown-item:hover, .breed-item:hover { background: #f0f7ff; color: var(--fl-blue); }

    /* BLUE PULSING PINS */
    .pulsing-marker { width: 12px; height: 12px; background-color: #2576d0; border-radius: 50%; border: 2px solid white; position: relative; }
    .pulsing-marker::after { 
        content: ""; width: 100%; height: 100%; border: 3px solid #2576d0; 
        border-radius: 50%; position: absolute; top: -3px; left: -3px; 
        animation: pulse 2s infinite ease-out; 
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(3.5); opacity: 0; } }

    #map-wrapper { position: relative; width: 95%; max-width: 1200px; margin-top: 40px; margin-bottom: 50px; }
    #map { height: 500px; width: 100%; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
    body:has(#breed-section:not(.hidden)) #map-wrapper { display: none !important; }

    #location-list { width: 95%; max-width: 1200px; background: white; border-radius: 18px; overflow: hidden; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    .directory-table { width: 100%; border-collapse: collapse; }
    .directory-table th { background: #f1f5f9; padding: 15px; font-size: 11px; text-transform: uppercase; color: #64748b; text-align: left; }
    .directory-table td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; color: #1e293b; }
    .city-name { font-weight: 700; color: var(--fl-orange); }
    .action-link { text-decoration: none; font-weight: 700; color: #166534; background: #dcfce7; padding: 8px 16px; border-radius: 8px; font-size: 12px; }

    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="tabs">
  <button id="tab-loc" class="tab-btn active" onclick="switchTab('locator')">ZIP Locator</button>
  <button id="tab-breed" class="tab-btn" onclick="switchTab('breed')">Breed Guide</button>
</div>

<div id="locator-section" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div class="card">
        <h2>FURRYLAND</h2>
        <p class="subtitle">Search Hubs</p>

        <div class="search-module">
            <label class="module-label accent-blue">SEARCH BY ZIP</label>
            <input type="text" id="zipInput" placeholder="Enter ZIP Code" maxlength="5" inputmode="numeric">
        </div>

        <div class="ui-divider"><span>OR</span></div>

        <div class="search-module">
            <label class="module-label">BROWSE BY CITY</label>
            <div class="search-container">
                <input type="text" id="hubSearchInput" placeholder="Type or Browse City..." onfocus="showDropdown()" oninput="filterDropdown()">
                <div id="customDropdown"></div>
            </div>
        </div>

        <button id="searchBtn" onclick="lookup()" disabled>Syncing Data...</button>
        
        <div id="result"></div>
    </div>

    <p id="list-header" class="hidden">STATE DIRECTORY</p>
    <div id="location-list"></div>

    <div id="map-wrapper">
        <button id="resetMapBtn" onclick="resetMap()" style="position: absolute; top: 15px; right: 15px; z-index: 1000; background: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">Reset USA View</button>
        <div id="map"></div>
    </div>
</div>

<div id="breed-section" class="card hidden">
    <h2>FURRYLAND</h2>
    <p class="subtitle">Breed Guide</p>
    
    <div class="breed-checker-container" style="margin-top: 20px; width: 100%; box-sizing: border-box; padding: 0 10px;">
        <div class="search-container">
            <input type="text" id="breedInput" placeholder="Type or Browse Breeds..." 
                   onfocus="showBreedDropdown()" oninput="filterBreeds()" 
                   onkeypress="if(event.key === 'Enter') checkBreed(this.value)">
            <div id="customBreedDropdown"></div>
        </div>

        <div id="breedResult" style="margin-top: 20px; min-height: 80px;">
           <p style="color: #666; font-style: italic;">Results will appear here...</p>
        </div>

        <div id="breedImageContainer">
            <img id="breedImg" src="" alt="Breed Photo">
        </div>
    </div>
</div>

  // --- 2. MAP & ACTIONS ---
function initMap() {
    if (map) return;
    map = L.map('map', {
        center: [39.82, -98.57],
        zoom: 4,
        zoomSnap: 0.5,
        wheelDebounceTime: 150
    });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
    
    // LAYER 1: State Shapes go on the BOTTOM
    loadStateShapes();
  }

  // 2. Fixed State Clicking (Doesn't block pins)
  async function loadStateShapes() {
    try {
      const res = await fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json');
      const geoData = await res.json();
      L.geoJson(geoData, {
        style: { color: "transparent", fillOpacity: 0.0, weight: 2 },
        onEachFeature: function(feature, layer) {
          layer.on('click', function(e) {
            const stateName = feature.properties.name;
            const matches = data.filter(d => 
                d.state && (d.state.toLowerCase() === stateName.toLowerCase() || 
                stateName.toLowerCase().includes(d.state.toLowerCase()))
            );
            
            // Only trigger if we aren't clicking a pin
            if (!e.originalEvent._markerClick) {
                document.getElementById('result').innerHTML = `📍 Hubs in ${stateName}`;
                document.getElementById('location-list').innerHTML = "";
                matches.forEach(m => renderSingleRow(m));
                map.fitBounds(layer.getBounds());
            }
          });
        }
      }).addTo(map);
    } catch (e) { console.error("Map layer failed"); }
  }

  // --- 3. DATA SYNC (With Safety Catch) ---
  async function loadData() {
    const btn = document.getElementById('searchBtn');
    try {
      const batchSize = 10;
      for (let i = 0; i < csvUrls.length; i += batchSize) {
        const batch = csvUrls.slice(i, i + batchSize);
        const results = await Promise.allSettled(batch.map(url => fetch(url).then(r => r.text())));
        results.forEach(res => {
          if (res.status === 'fulfilled' && res.value) {
            const rows = res.value.split('\n').slice(1);
            rows.forEach(row => {
              const m = row.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
              if (m && m.length >= 5) {
                data.push({ 
                  city: m[4]?.trim() || "", zip: m[1]?.trim() || "", phone: m[2]?.trim() || "No phone", 
                  link: m[3]?.replace(/"/g, '').trim() || "#", state: m[5]?.trim() || "", lat: m[6], lng: m[7] 
                });
              }
            });
          }
        });
        btn.textContent = `Syncing (${Math.min(i+batchSize, csvUrls.length)}/${csvUrls.length})`;
      }
      btn.disabled = false; btn.textContent = "Search ZIP";
      plotHubs(); buildCustomDropdown();
    } catch (e) { btn.disabled = false; btn.textContent = "Search ZIP"; }
  }

function plotHubs() {
    // 1. Clear old markers to save memory
    for (let k in markers) { map.removeLayer(markers[k]); }
    
    // 2. Create a 'Layer Group' - this is MUCH faster for Leaflet
    const markerGroup = L.layerGroup().addTo(map);

    data.forEach(d => {
      const city = d.city?.trim();
      if (city && rawCoords[city]) {
        // Use a simple DIV icon (the pulsing dot)
        const icon = L.divIcon({ 
          className: '', 
          html: '<div class="pulsing-marker"></div>', 
          iconSize: [12, 12], 
          iconAnchor: [6, 6] 
        });

        // Create the marker with basic popup only
        const marker = L.marker(rawCoords[city], { 
            icon: icon,
            riseOnHover: true // This is a native Leaflet optimization
        }).bindPopup(`<strong>${city}</strong><br>${d.phone}`);

        // Only one simple listener
        marker.on('click', function() {
            selectCity(city);
        });

        markers[city] = marker;
        markerGroup.addLayer(marker);
      }
    });
  }

  // --- 4. NAVIGATION ---
  async function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const res = document.getElementById('result');
    const list = document.getElementById('location-list');
    list.innerHTML = ""; res.innerHTML = "";

    const match = data.find(d => d.zip === zip);
    if (match) {
      res.innerHTML = "📍 Match Found: " + match.city;
      renderSingleRow(match);
      if (rawCoords[match.city]) map.flyTo(rawCoords[match.city], 14);
      return;
    }
    if (zip.length === 5) {
      res.innerText = "🔍 Checking nearby...";
      try {
        const zRes = await fetch(`https://api.zippopotam.us/us/${zip}`);
        const zData = await zRes.json();
        const tLat = parseFloat(zData.places[0].latitude);
        const tLon = parseFloat(zData.places[0].longitude);
        let closestDist = Infinity; let closestRow = null;
        data.forEach(row => {
          let rLat = rawCoords[row.city] ? rawCoords[row.city][0] : parseFloat(row.lat);
          let rLng = rawCoords[row.city] ? rawCoords[row.city][1] : parseFloat(row.lng);
          if (rLat && rLng) {
            const d = getDistance(tLat, tLon, rLat, rLng);
            if (d < closestDist) { closestDist = d; closestRow = row; }
          }
        });
        if (closestRow && closestDist <= 8) {
          res.innerHTML = "🛑 Neighbor Found";
          list.innerHTML = `<div style="background:#fff5f5; padding:20px; border-radius:15px; text-align:center; color:#c53030; border:2px solid #feb2b2; margin-bottom:15px; font-weight:bold;">🛑 NEIGHBOR ZIP: APPROVAL REQUIRED (${closestDist.toFixed(1)} miles)</div>`;
          renderSingleRow(closestRow, true);
          if (rawCoords[closestRow.city]) map.flyTo(rawCoords[closestRow.city], 12);
        } else { res.innerText = "❌ No service found."; }
      } catch (e) { res.innerText = "❌ Invalid ZIP."; }
    }
  }

  function selectCity(city) {
    document.getElementById('hubSearchInput').value = city;
    document.getElementById('customDropdown').style.display = 'none';
    const match = data.find(d => d.city.trim() === city);
    if (match) {
      document.getElementById('result').innerHTML = "📍 Hub Selected: " + city;
      document.getElementById('location-list').innerHTML = "";
      renderSingleRow(match);
      if (rawCoords[city]) map.flyTo(rawCoords[city], 10);
    }
  }

  function renderSingleRow(m, isN = false) {
    const badge = isN ? `<span style="background:#718096; color:white; padding:3px 10px; border-radius:6px; font-size:11px; margin-left:12px;">INQUIRY ONLY</span>` : "";
    document.getElementById('location-list').innerHTML += `<table class="directory-table"><thead><tr><th>Hub Location</th><th>Phone Number</th><th>Action</th></tr></thead><tbody><tr><td><span class="city-name">${m.city}</span>${badge}</td><td>${m.phone}</td><td><a href="${m.link}" target="_blank" class="action-link">📅 OPEN MOEGO</a></td></tr></tbody></table>`;
  }

  function getDistance(la1, lo1, la2, lo2) {
    const R = 3958.8; const dLat = (la2-la1)*Math.PI/180; const dLon = (lo2-lo1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function buildCustomDropdown() {
    const dropdown = document.getElementById('customDropdown');
    const cities = [...new Set(data.map(d => d.city.trim()))].filter(c => c && rawCoords[c]).sort();
    dropdown.innerHTML = cities.map(city => `<div class="dropdown-item" onclick="selectCity('${city}')">${city}</div>`).join('');
  }

  // --- 5. BREED LOGIC (With Wikipedia Image) ---
  async function loadBreeds() {
    const breedCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=552993732&single=true&output=csv';
    try {
      const response = await fetch(breedCsvUrl);
      const rows = (await response.text()).split(/\r?\n/);
      breedDatabase = [];
      rows.slice(1).forEach(row => {
        const cols = row.split(',');
        if (cols[0]) breedDatabase.push({ name: cols[0].replace(/"/g, "").trim(), type: "Complex" });
        if (cols[1]) breedDatabase.push({ name: cols[1].replace(/"/g, "").trim(), type: "Non-Complex" });
      });
      const dropdown = document.getElementById('customBreedDropdown');
      dropdown.innerHTML = breedDatabase.sort((a,b) => a.name.localeCompare(b.name)).map(b => `<div class="breed-item" onclick="selectBreed('${b.name}')">${b.name}</div>`).join('');
    } catch (e) {}
  }

  function selectBreed(n) { document.getElementById('breedInput').value = n; document.getElementById('customBreedDropdown').style.display = 'none'; checkBreed(n); }

  async function checkBreed(val) {
    const display = document.getElementById('breedResult');
    const imgCont = document.getElementById('breedImageContainer');
    const imgEl = document.getElementById('breedImg');
    const found = breedDatabase.find(b => b.name.toLowerCase() === val.toLowerCase());
    if (found) {
      display.innerHTML = `<div class="result-display ${found.type === 'Complex' ? 'is-complex' : 'is-simple'}">${found.name} is a ${found.type} coat</div>`;
      try {
        const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(found.name)}`);
        const wData = await res.json();
        const imgUrl = wData.originalimage ? wData.originalimage.source : (wData.thumbnail ? wData.thumbnail.source : null);
        if (imgUrl) { imgEl.src = imgUrl; imgCont.style.display = "block"; } else { imgCont.style.display = "none"; }
      } catch (e) { imgCont.style.display = "none"; }
    }
  }

  function switchTab(t) {
    document.getElementById('locator-section').classList.toggle('hidden', t !== 'locator');
    document.getElementById('breed-section').classList.toggle('hidden', t === 'locator');
    document.getElementById('tab-loc').classList.toggle('active', t === 'locator');
    document.getElementById('tab-breed').classList.toggle('active', t !== 'locator');
    if(t === 'locator') setTimeout(() => { initMap(); map.invalidateSize(); }, 200);
  }

  function showDropdown() { document.getElementById('customDropdown').style.display = 'block'; }
  function showBreedDropdown() { document.getElementById('customBreedDropdown').style.display = 'block'; }
  function filterDropdown() {
    const input = document.getElementById('hubSearchInput').value.toLowerCase();
    document.querySelectorAll('.dropdown-item').forEach(i => i.style.display = i.innerText.toLowerCase().includes(input) ? 'block' : 'none');
  }
  function filterBreeds() {
    const input = document.getElementById('breedInput').value.toLowerCase();
    document.querySelectorAll('.breed-item').forEach(i => i.style.display = i.innerText.toLowerCase().includes(input) ? 'block' : 'none');
  }
  function resetMap() { map.setView([39.82, -98.57], 4); document.getElementById('location-list').innerHTML = ""; document.getElementById('result').innerText = ""; }

  window.onclick = (e) => { 
    if (!e.target.matches('#hubSearchInput')) document.getElementById('customDropdown').style.display = 'none';
    if (!e.target.matches('#breedInput')) document.getElementById('customBreedDropdown').style.display = 'none';
  }

  document.addEventListener('DOMContentLoaded', () => { initMap(); loadBreeds(); loadData(); });
</script>
