    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1216528010&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=1348062773&single=true&output=csv',
    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBytNjjgpyhBn5mFaMFAwTW5SMRoQIBKN9nDRawG2tuGG7RMwZ7DCorF2RWVRTccoYAKzKmSqAhGf/pub?gid=874715943&single=true&output=csv'
  ];

  const stateCodes = { 'New Mexico': 'NM', 'Georgia': 'GA', 'Texas': 'TX', 'Louisiana': 'LA', 'Idaho': 'ID', 'Massachusetts': 'MA', 'New Jersey': 'NJ', 'Florida': 'FL', 'Indiana': 'IN', 'South Carolina': 'SC', 'North Carolina': 'NC', 'Tennessee': 'TN', 'Ohio': 'OH', 'Colorado': 'CO', 'Michigan': 'MI', 'Connecticut': 'CT', 'Pennsylvania': 'PA', 'Alabama': 'AL', 'Nevada': 'NV', 'Kentucky': 'KY', 'Arkansas': 'AR', 'Wisconsin': 'WI', 'Oklahoma': 'OK', 'Arizona': 'AZ', 'Oregon': 'OR', 'Nebraska': 'NE', 'Vermont': 'VT', 'Virginia': 'VA', 'Missouri': 'MO', 'Kansas': 'KS' };

  const map = L.map('map', { center: [39.82, -98.57], zoom: 4 });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

  fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
    .then(res => res.json())
    .then(statesData => {
      L.geoJson(statesData, {
        style: { fillColor: '#e0e0e0', weight: 1.5, color: 'white', fillOpacity: 0.4 },
        onEachFeature: (feature, layer) => {
          layer.on({
            mouseover: (e) => e.target.setStyle({ fillOpacity: 0.6, fillColor: '#2576d0' }),
            mouseout: (e) => e.target.setStyle({ fillOpacity: 0.4, fillColor: '#e0e0e0' }),
            click: (e) => { 
                map.fitBounds(e.target.getBounds()); 
                displayStateLocations(stateCodes[feature.properties.name] || feature.properties.name); 
            }
          });
        }
      }).addTo(map);
    });

  // --- 1. DATA LOADING ENGINE ---
  async function loadData() {
    try {
      data = []; // Reset array
      const responses = await Promise.all(csvUrls.map(url => fetch(url).then(r => r.text())));
      
      responses.forEach(csv => {
        const rows = csv.split('\n');
        rows.slice(1).forEach(row => {
          const m = row.match(/(".*?"|[^,]+)(?=\s*,|\s*$)/g);
          if (m && m.length >= 5) {
            data.push({ 
              name: m[0].replace(/"/g, '').trim(), 
              zip: m[1].trim(), 
              phone: m[2]?.trim() || "No phone", 
              link: m[3]?.replace(/"/g, '').trim() || "#", 
              city: m[4]?.trim() || "",
              state: m[5]?.trim() || "", // This was index 5
              lat: m[6]?.trim() || null, 
              lng: m[7]?.replace(/\r/g, '').trim() || null 
            });
          }
        });
      });

      document.getElementById('searchBtn').disabled = false;
      document.getElementById('searchBtn').textContent = "Search ZIP";
      
      plotHubs(); 
      buildCustomDropdown();
      console.log("Precision Data Loaded. Total Rows:", data.length);
    } catch (err) { 
      console.error("Load Error: ", err); 
    }
  }

  // --- 2. THE SEARCH BRAIN ---
  async function lookup() {
    const zip = document.getElementById('zipInput').value.trim();
    const res = document.getElementById('result');
    const head = document.getElementById('list-header');
    const list = document.getElementById('location-list');

    // Reset UI state
    list.innerHTML = "";
    head.classList.add('hidden');

    // A. EXACT MATCH
    const match = data.find(d => d.zip === zip);
    if (match) {
      res.innerText = "📍 Exact Match Found: " + match.city;
      head.classList.remove('hidden');
      head.innerText = "SEARCH RESULT";
      renderSingleRow(match);
      
      // Navigate to coordinates if we have them, otherwise use City fallback
      const flyLat = match.lat ? parseFloat(match.lat) : (rawCoords[match.city] ? rawCoords[match.city][0] : null);
      const flyLng = match.lng ? parseFloat(match.lng) : (rawCoords[match.city] ? rawCoords[match.city][1] : null);
      
      if (flyLat && flyLng) {
          map.flyTo([flyLat, flyLng], 12);
          if (markers[match.city]) markers[match.city].openPopup();
      }
      return;
    }

    // B. PRECISION NEIGHBOR SEARCH
    if (zip.length === 5) {
      res.innerText = "🔍 Checking closest neighbor...";
      try {
        const response = await fetch(`https://api.zippopotam.us/us/${zip}`);
        if (!response.ok) throw new Error();
        const zipData = await response.json();
        const targetLat = parseFloat(zipData.places[0].latitude);
        const targetLon = parseFloat(zipData.places[0].longitude);

        let closestDist = Infinity;
        let closestRow = null;

        for (let row of data) {
          // Use precision coordinates first, fallback to Hub coordinates
          let rowLat = row.lat ? parseFloat(row.lat) : (rawCoords[row.city] ? rawCoords[row.city][0] : null);
          let rowLng = row.lng ? parseFloat(row.lng) : (rawCoords[row.city] ? rawCoords[row.city][1] : null);

          if (rowLat && rowLng) {
            const dist = getDistance(targetLat, targetLon, rowLat, rowLng);
            if (dist < closestDist) {
              closestDist = dist;
              closestRow = row;
            }
          }
        }

        if (closestRow && closestDist <= 8) { 
          res.innerHTML = `<span style="color: #856404;">⚠️ Not in list, but <strong>${closestDist.toFixed(1)} miles</strong> from ZIP ${closestRow.zip}.</span>`;
          head.classList.remove('hidden');
          head.innerText = "NEIGHBOR ALERT";
          
          list.innerHTML = `
            <div style="background: #fff3cd; padding: 15px; border-radius: 12px; text-align: center; color: #856404; margin-bottom: 10px; border: 1px solid #ffeeba;">
              <strong>CLOSE NEIGHBOR:</strong> Only <strong>${closestDist.toFixed(1)} miles</strong> from our route in <strong>${closestRow.city}</strong>.
            </div>
          `;
          renderSingleRow(closestRow);
          
          let flyLat = closestRow.lat ? parseFloat(closestRow.lat) : rawCoords[closestRow.city][0];
          let flyLng = closestRow.lng ? parseFloat(closestRow.lng) : rawCoords[closestRow.city][1];
          map.flyTo([flyLat, flyLng], 10);
        } else {
          res.innerText = "❌ No service within 8 miles.";
          resetSearchState();
        }
      } catch (e) {
        res.innerText = "❌ Invalid ZIP.";
        resetSearchState();
      }
    }
  }

  // --- 3. VISUAL HELPERS ---
  function plotHubs() {
    for(let k in markers) map.removeLayer(markers[k]);
    markers = {};
    const plotted = new Set();
    
    data.forEach(d => {
      const city = d.city.trim();
      if (city && rawCoords[city] && !plotted.has(city)) {
        plotted.add(city);
        const icon = L.divIcon({ className: '', html: '<div class="pulsing-marker"></div>', iconSize: [10, 10], iconAnchor: [5, 5] });
        const marker = L.marker(rawCoords[city], { icon: icon }).addTo(map).bindPopup(`<div style="text-align: center;"><strong>FurryLand ${city}</strong><br><div style="margin: 5px 0; font-size:13px;">📞 ${d.phone}</div><a href="${d.link}" target="_blank" rel="noopener noreferrer" class="action-link">OPEN MOEGO</a></div>`);
        markers[city] = marker;
      }
    });
  }

  function buildCustomDropdown() {
    const dropdown = document.getElementById('customDropdown');
    const cities = [...new Set(data.map(d => d.city.trim()))].filter(c => c && rawCoords[c]).sort();
    dropdown.innerHTML = cities.map(city => `<div class="dropdown-item" onclick="selectCity('${city}')">${city}</div>`).join('');
  }

  function showDropdown() { document.getElementById('customDropdown').style.display = 'block'; }
  function filterDropdown() {
    const input = document.getElementById('hubSearchInput').value.toLowerCase();
    const items = document.querySelectorAll('.dropdown-item');
    items.forEach(item => item.style.display = item.innerText.toLowerCase().includes(input) ? 'block' : 'none');
  }

  function selectCity(city) {
    document.getElementById('hubSearchInput').value = city;
    document.getElementById('customDropdown').style.display = 'none';
    const match = data.find(d => d.city.trim() === city);
    const head = document.getElementById('list-header');
    if (match && rawCoords[city]) {
      map.flyTo(rawCoords[city], 8);
      if (markers[city]) markers[city].openPopup();
      document.getElementById('result').innerText = "📍 Match Found: " + city;
      head.classList.remove('hidden'); head.innerText = "SEARCH RESULT";
      renderSingleRow(match);
    }
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 3958.8; 
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c; 
  }

  function renderSingleRow(m) {
    const list = document.getElementById('location-list');
    const cityDisplayName = m.name && m.name !== m.city ? m.name : m.city;
    
    list.innerHTML += `
      <table class="directory-table">
        <thead>
          <tr>
            <th>Hub Location</th>
            <th>Phone Number</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><span class="city-name">${cityDisplayName}</span></td>
            <td>
              <span class="phone-text">${m.phone}</span>
              <button class="copy-btn" onclick="copyToClipboard('${m.phone}')">📋</button>
            </td>
            <td><a href="${m.link}" target="_blank" rel="noopener noreferrer" class="action-link">📅 OPEN MOEGO</a></td>
          </tr>
        </tbody>
      </table>
    `;
  }

  function displayStateLocations(code) {
    const list = document.getElementById('location-list');
    const head = document.getElementById('list-header');
    const searchCode = code.trim().toUpperCase();
    const fullName = Object.keys(stateCodes).find(k => stateCodes[k] === searchCode)?.toUpperCase() || "";
    
    const matches = data.filter(d => { 
        const s = (d.state || "").trim().toUpperCase(); 
        return s === searchCode || s === fullName; 
    });

    const unique = [];
    const seen = new Set();

    matches.forEach(m => {
      const identifier = `${m.city}-${m.name}`.toLowerCase().trim();
      if (!seen.has(identifier)) {
        seen.add(identifier);
        unique.push(m);
      }
    });

    if(unique.length > 0) {
      head.classList.remove('hidden'); 
      head.innerText = `ACTIVE HUBS: ${searchCode}`;
      list.innerHTML = `
        <table class="directory-table">
          <thead>
            <tr>
              <th>Hub Location</th>
              <th>Phone Number</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${unique.map(m => {
              const specialNote = m.name !== m.city ? `<span class="badge" style="font-size:10px; background:#fff3e0; color:#e65100; padding:2px 6px; border-radius:4px; border:1px solid #ffe0b2; margin-left:8px;">${m.name}</span>` : "";
              return `
              <tr>
                <td><span class="city-name">${m.city}</span>${specialNote}</td>
                <td>
                  <span class="phone-text">${m.phone}</span>
                  <button class="copy-btn" onclick="copyToClipboard('${m.phone}')" title="Copy Number">📋</button>
                </td>
                <td><a href="${m.link}" target="_blank" rel="noopener noreferrer" class="action-link">📅 OPEN MOEGO</a></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
      window.scrollTo({ top: head.offsetTop - 20, behavior: 'smooth' });
    } else { 
      head.classList.remove('hidden'); 
      head.innerText = `NO DATA FOR ${searchCode}`; 
      list.innerHTML = "<p style='padding:20px; color:#999;'>No hubs found for this state.</p>"; 
    }
  }

  function resetSearchState() { document.getElementById('location-list').innerHTML = ""; document.getElementById('list-header').classList.add('hidden'); map.setView([39.82, -98.57], 4); setTimeout(() => { document.getElementById('result').innerText = ""; }, 2500); }
  function copyToClipboard(text) { navigator.clipboard.writeText(text); alert('Number copied!'); }
  function resetMap() { map.setView([39.82, -98.57], 4); document.getElementById('location-list').innerHTML = ""; document.getElementById('list-header').classList.add('hidden'); document.getElementById('result').innerText = ""; }
  function switchTab(t) { document.getElementById('locator-section').classList.toggle('hidden', t !== 'locator'); document.getElementById('breed-section').classList.toggle('hidden', t === 'locator'); document.getElementById('tab-loc').classList.toggle('active', t === 'locator'); document.getElementById('tab-breed').classList.toggle('active', t !== 'locator'); if(t === 'locator') setTimeout(() => map.invalidateSize(), 200); }
  
  window.onclick = (e) => { if (!e.target.matches('#hubSearchInput')) document.getElementById('customDropdown').style.display = 'none'; }
  document.getElementById('zipInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') lookup(); });
  
  loadData();
</script>
